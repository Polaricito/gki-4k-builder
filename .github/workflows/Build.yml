name: Compilador de Kernel Samsung (KernelSU + SUSFS)

on:
  workflow_dispatch:
    inputs:
      DEFCONFIG_NAME:
        description: 'Nombre del archivo defconfig de tu Samsung (ej: a05_global_defconfig)'
        required: true
        default: 'defconfig'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio (CI Config y Fuentes)
        uses: actions/checkout@v4

      - name: Verificar Fuentes del Kernel
        run: |
          if [ -d "$GITHUB_WORKSPACE/kernel-source" ]; then
              echo "¡Carpeta kernel-source detectada con éxito!"
          else
              echo "ERROR CRÍTICO: No se encuentra la carpeta 'kernel-source' en la raíz del repositorio."
              echo "Asegúrate de descomprimir el código de Samsung ahí dentro antes de subirlo."
              exit 1
          fi

      - name: Instalar Dependencias y Compiladores Nativos
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld liblz4-tool pixz zip binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu python3

      - name: Integrar KernelSU NATIVO
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          # Descarga e integra el código de KernelSU de forma oficial en el árbol del kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Descargar e Integrar SUSFS
        run: |
          cd $GITHUB_WORKSPACE
          # Clonamos el repositorio de parches SUSFS adaptados para KernelSU
          git clone --depth=1 https://gitlab.com/ those777/susfs4ksu.git susfs_assets || git clone --depth=1 https://github.com/ashish-b7/susfs4ksu.git susfs_assets
          
          cd $GITHUB_WORKSPACE/kernel-source
          
          # Copiar los archivos de drivers SUSFS al árbol del kernel
          cp $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/FS_PATCH/fs/susfs.c fs/
          cp $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/Include_Patches/include/linux/susfs.h include/linux/
          
          # Intentar aplicar los parches automáticos a los archivos del sistema de archivos
          # (Nota: Si tu base de Samsung difiere mucho, estos parches podrían requerir revisión manual en el futuro)
          git apply --check $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/FS_PATCH/5.10/0001-ksu_susfs-add-susfs-to-kernel.patch || true
          git apply $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/FS_PATCH/5.10/0001-ksu_susfs-add-susfs-to-kernel.patch || echo "Aviso: El parche automático falló, continuando..."

      - name: Configurar Defconfig y Dieta Estricta de Tamaño
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          TARGET_CONFIG="arch/arm64/configs/${{ github.event.inputs.DEFCONFIG_NAME }}"
          
          if [ ! -f "$TARGET_CONFIG" ]; then
              echo "ERROR: El archivo de configuración $TARGET_CONFIG no existe en tus fuentes."
              echo "Archivos disponibles en configs:"
              ls arch/arm64/configs/
              exit 1
          fi

          # 1. Asegurar tamaño de página de memoria a 4KB
          echo "CONFIG_ARM64_4K_PAGES=y" >> $TARGET_CONFIG
          sed -i '/CONFIG_ARM64_16K_PAGES/d' $TARGET_CONFIG
          sed -i '/CONFIG_ARM64_64K_PAGES/d' $TARGET_CONFIG

          # 2. Habilitar banderas estables de KernelSU y SUSFS
          echo "CONFIG_KSU=y" >> $TARGET_CONFIG
          echo "CONFIG_SUSFS=y" >> $TARGET_CONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $TARGET_CONFIG
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $TARGET_CONFIG

          # 3. ELIMINAR SÍMBOLOS DE DEPURAClÓN (Dieta drástica para no pasar los 32MB)
          sed -i '/CONFIG_DEBUG_INFO/d' $TARGET_CONFIG
          echo "CONFIG_DEBUG_INFO_NONE=y" >> $TARGET_CONFIG

          # 4. FORZAR OPTIMIZAClÓN DE TAMAÑO BINARIO (-Os)
          sed -i '/CONFIG_CC_OPTIMIZE/d' $TARGET_CONFIG
          echo "CONFIG_CC_OPTIMIZE_FOR_SIZE=y" >> $TARGET_CONFIG

      - name: Compilar Kernel Oficial Samsung
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          
          # Preparar la configuración base elegida
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- ${{ github.event.inputs.DEFCONFIG_NAME }}
          
          # Compilar usando todos los hilos del procesador virtual de GitHub
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Empaquetar Kernel (AnyKernel3 Seguro para Samsung)
        run: |
          cd $GITHUB_WORKSPACE
          
          # 1. Localizar el binario de salida del Kernel compilado
          KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source/out -name "Image" | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
              KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source -name "Image" | head -n 1)
          fi

          if [ -z "$KERNEL_IMAGE" ]; then
              echo "ERROR CRÍTICO: No se generó el archivo 'Image' durante la compilación."
              exit 1
          fi
          echo "¡Kernel Image detectado exitosamente en: $KERNEL_IMAGE!"

          # 2. Clonar y preparar AnyKernel3 enfocado en la ruta de bloques de Samsung
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMAGE" AnyKernel3/Image
          cd AnyKernel3
          
          # Modificaciones de script seguras para flashear sin bloqueos de firma/nombre
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's|block=/dev/block/bootdevice/by-name/boot;|block=/dev/block/by-name/boot;|g' anykernel.sh
          sed -i 's|block=auto;|block=/dev/block/by-name/boot;|g' anykernel.sh
          
          # Generar archivo comprimido final para TWRP
          zip -r9 $GITHUB_WORKSPACE/Kernel_Samsung_OneUI7_KernelSU_SUSFS.zip *
          echo "¡ZIP de AnyKernel3 creado exitosamente!"

      - name: Subir Artefacto Compilado a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Samsung_Modificado
          path: ${{ github.workspace }}/Kernel_Samsung_OneUI7_KernelSU_SUSFS.zip
          
