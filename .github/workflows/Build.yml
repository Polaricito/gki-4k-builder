name: Compilador de Kernel GKI con KernelSU y SUSFS

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  KERNEL_ROOT: "kernel-source/kernel-6.6" # Ajusta esta ruta si tu carpeta de origen tiene otro nombre
  TARGET_CONFIG: "defconfig" # Ajusta al nombre de tu defconfig si es diferente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Repositorio Local
        uses: actions/checkout@v4

      - name: Configurar Entorno de Compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libelf-dev libssl-dev lld llvm crossbuild-essential-arm64

      - name: Descargar e Integrar SUSFS Oficial
        run: |
          cd $GITHUB_WORKSPACE
          REPO_URL="https://gitlab.com/simonpunk/susfs4ksu.git"
          WANT_BRANCH="android15-6.6"
          TARGET_DIR="$GITHUB_WORKSPACE/susfs_assets"
          
          echo "Verificando disponibilidad de la rama $WANT_BRANCH en el servidor de SUSFS..."
          if git ls-remote --heads "$REPO_URL" "$WANT_BRANCH" | grep -q "$WANT_BRANCH"; then
              echo "Rama específica encontrada. Clonando..."
              git clone --depth=1 -b "$WANT_BRANCH" "$REPO_URL" "$TARGET_DIR"
          else
              echo "Aviso: La rama $WANT_BRANCH no está disponible. Clonando rama principal..."
              git clone --depth=1 "$REPO_URL" "$TARGET_DIR"
          fi

            - name: Parchear mm/io_record.c y Ganchos de Rastreo de Samsung
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          if [ -f "mm/io_record.c" ]; then
              echo "Inyectando stubs de mitigación robustos al INICIO de mm/io_record.c..."
              
              # Prevenir errores de -Werror,-Wunused-function
              sed -i 's/^static void io_record_ksys_umount/static void __maybe_unused io_record_ksys_umount/' mm/io_record.c
              sed -i 's/^static void io_record_do_read_fault/static void __maybe_unused io_record_do_read_fault/' mm/io_record.c
              sed -i 's/^static void io_record_filemap_map_pages/static void __maybe_unused io_record_filemap_map_pages/' mm/io_record.c
              sed -i 's/^static void io_record_filemap_read/static void __maybe_unused io_record_filemap_read/' mm/io_record.c
              
              # Creamos los stubs usando do {} while(0) para evitar "statement with no effect"
              printf '%s\n' \
                '#define register_trace_android_vh_do_read_fault(...) do { } while (0)' \
                '#define unregister_trace_android_vh_do_read_fault(...) do { } while (0)' \
                '#define register_trace_android_vh_filemap_map_pages(...) do { } while (0)' \
                '#define unregister_trace_android_vh_filemap_map_pages(...) do { } while (0)' \
                '#define register_trace_android_vh_filemap_read(...) do { } while (0)' \
                '#define unregister_trace_android_vh_filemap_read(...) do { } while (0)' \
                '#define register_trace_android_rvh_ksys_umount(...) do { } while (0)' \
                '#define unregister_trace_android_rvh_ksys_umount(...) do { } while (0)' > mm/io_record.tmp
              
              # Concatenamos el contenido original abajo de nuestros stubs blindados
              cat mm/io_record.c >> mm/io_record.tmp
              
              # Reemplazamos el archivo original
              mv mm/io_record.tmp mm/io_record.c
              echo "¡Modificaciones avanzadas en mm/io_record.c completadas!"
          fi


      - name: Crear Stubs de Hooks de Rastreo Android (Ganchos Samsung)
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          HOOK_DIR="include/trace/hooks"
          mkdir -p "$HOOK_DIR"
          
          if [ ! -f "$HOOK_DIR/mm.h" ]; then
              echo "Generando stub de emergencia seguro: $HOOK_DIR/mm.h"
              printf '%s\n' \
                '#ifndef _TRACE_HOOK_MM_H' \
                '#define _TRACE_HOOK_MM_H' \
                '#include <linux/tracepoint.h>' \
                '' \
                'DECLARE_TRACE(android_vh_do_read_fault, TP_PROTO(void *data, struct vm_fault *vmf, unsigned long fault_around_pages), TP_ARGS(data, vmf, fault_around_pages));' \
                'DECLARE_TRACE(android_vh_filemap_map_pages, TP_PROTO(void *data, struct file *file, pgoff_t first_pgoff, pgoff_t last_pgoff, vm_fault_t ret), TP_ARGS(data, file, first_pgoff, last_pgoff, ret));' \
                'DECLARE_TRACE(android_vh_filemap_read, TP_PROTO(void *data, struct file *file, loff_t pos, size_t size), TP_ARGS(data, file, pos, size));' \
                '' \
                '#endif' > "$HOOK_DIR/mm.h"
          fi
          
          if [ ! -f "$HOOK_DIR/fs.h" ]; then
              echo "Generando stub de emergencia seguro: $HOOK_DIR/fs.h"
              printf '%s\n' \
                '#ifndef _TRACE_HOOK_FS_H' \
                '#define _TRACE_HOOK_FS_H' \
                '#include <linux/tracepoint.h>' \
                '' \
                'DECLARE_TRACE(android_rvh_ksys_umount, TP_PROTO(void *data, char __user *name, int flags), TP_ARGS(data, name, flags));' \
                '' \
                '#endif' > "$HOOK_DIR/fs.h"
          fi

      - name: Parchear drivers/hid/hid-samsung.c (Código Inalcanzable set_bit)
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          if [ -f "drivers/hid/hid-samsung.c" ]; then
              echo "Corrigiendo posiciones de set_bit en switch blocks dentro de hid-samsung.c..."
              # Busca el patrón switch con set_bit interno e invierte de forma segura su orden jerárquico
              perl -0777 -pi -e 's/switch\s*\(usage->hid\s*&\s*HID_USAGE\)\s*\{\s*set_bit\s*\(\s*EV_REP\s*,\s*hi->input->evbit\s*\);/set_bit(EV_REP, hi->input->evbit);\n\tswitch (usage->hid \& HID_USAGE) {/g' drivers/hid/hid-samsung.c
              echo "¡Parche de drivers/hid/hid-samsung.c aplicado con éxito!"
          fi

      - name: Sanear y Unificar Definiciones de fslog_stlog
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          if [ -f "fs/fuse/inode.c" ]; then
              echo "Detectado fs/fuse/inode.c. Eliminando código viejo y duplicados de fslog_stlog..."
              
              # Neutralizar la firma void rota original de Samsung cambiándole el nombre
              sed -i 's/void __attribute__((weak)) fslog_stlog/void __attribute__((weak)) fslog_stlog_old/g' fs/fuse/inode.c
              sed -i 's/void __attribute__((weak))fslog_stlog/void __attribute__((weak)) fslog_stlog_old/g' fs/fuse/inode.c
              
              # Eliminar cualquier duplicado 'int' inyectado de ejecuciones previas
              sed -i '/int __attribute__((weak)) fslog_stlog/,/}/d' fs/fuse/inode.c
              
              # Inyectar de manera segura usando saltos de línea controlados por printf
              printf '\nint __attribute__((weak)) fslog_stlog(const char *fmt, ...) {\n    return 0;\n}\n' >> fs/fuse/inode.c
              echo "¡Purga y unificación de fslog_stlog finalizada con éxito!"
          fi

      - name: Auto-Detector de Defconfig y Ajustes de Compilación
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          # Asegurar que FUSE se compile integrado para evitar conflictos de símbolos dinámicos (.ko)
          if [ -f "arch/arm64/configs/${{ env.TARGET_CONFIG }}" ]; then
              sed -i 's/CONFIG_FUSE_FS=m/CONFIG_FUSE_FS=y/g' arch/arm64/configs/${{ env.TARGET_CONFIG }}
              echo "CONFIG_FUSE_FS=y" >> arch/arm64/configs/${{ env.TARGET_CONFIG }}
              echo "CONFIG_SAMSUNG_DEBUG_FS_LOGGING=n" >> arch/arm64/configs/${{ env.TARGET_CONFIG }}
          fi

      - name: Compilar Kernel Completo
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out ${{ env.TARGET_CONFIG }}
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out -j$(nproc)

      - name: Desempaquetar y Re-empaquetar Boot Image para Odin/Fastboot
        run: |
          echo "Buscando boot.img original subido a la raíz..."
          if [ -f "$GITHUB_WORKSPACE/boot.img" ]; then
              echo "¡boot.img original localizado!"
              
              # Creamos un directorio aislado para que cp no se muerda la cola
              mkdir -p $GITHUB_WORKSPACE/repack
              cd $GITHUB_WORKSPACE/repack
              
              # Copiamos el boot original desde la raíz a nuestra carpeta de trabajo
              cp "$GITHUB_WORKSPACE/boot.img" ./boot.img
              
              echo "Descargando magiskboot nativo para Linux x86_64..."
              curl -Lo magiskboot https://github.com/Uevo001/magiskboot-linux/raw/main/x86_64/magiskboot
              chmod +x magiskboot
              
              echo "Desempaquetando boot.img de stock..."
              ./magiskboot unpack boot.img
              
              echo "Buscando el archivo kernel (Image) recién compilado..."
              KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }} -name Image -type f | head -n 1)
              if [ -z "$KERNEL_IMAGE" ]; then
                  echo "ERROR: No se encontró el archivo Image compilado."
                  exit 1
              fi
              echo "Kernel encontrado en: $KERNEL_IMAGE"
              
              echo "Reemplazando el kernel original por el nuevo..."
              cp -f "$KERNEL_IMAGE" kernel
              
              echo "Re-empaquetando el boot.img..."
              ./magiskboot repack boot.img new-boot.img
              
              if [ -f "new-boot.img" ]; then
                  echo "¡boot.img con KernelSU y SUSFS creado con éxito!"
                  mkdir -p $GITHUB_WORKSPACE/output
                  cp new-boot.img $GITHUB_WORKSPACE/output/boot.img
                  
                  echo "Creando archivo .tar para flashear directamente por Odin..."
                  cd $GITHUB_WORKSPACE/output
                  tar -cvf boot.tar boot.img
                  echo "¡boot.tar creado con éxito!"
              else
                  echo "ERROR: Falló el re-empaquetado con magiskboot."
                  exit 1
              fi
          else
              echo "ERROR: Por favor sube tu boot.img original a la raíz de tu repositorio con el nombre exacto 'boot.img'."
              exit 1
          fi

      - name: Subir Imagen de Boot Modificada (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: boot-patched-KernelSU
          path: |
            boot-kernelsu.img
            kernel-source/kernel-6.6/out/arch/arm64/boot/Image
