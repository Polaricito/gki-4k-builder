name: Compilar GKI 6.6 con KSU y SUSFS (4KB)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximizar espacio de almacenamiento en el servidor
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
      - name: Maximizar espacio en disco para la compilación
        run: |
          echo "=== Espacio inicial en disco ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -a -f
          echo "=== Espacio libre tras limpieza ==="
          df -h

      - name: Clonar Android Common Kernel (GKI 6.6)
        run: |
          git clone --depth=1 -b android15-6.6 https://android.googlesource.com/kernel/common kernel-source

      - name: Instalar Dependencias y Compiladores LLVM Nativos
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison git libncurses-dev clang lld llvm gcc-aarch64-linux-gnu

      - name: Inyectar KernelSU y Parches SUSFS
        run: |
         cd kernel-source

             # 1. Limpieza absoluta de intentos anteriores redundantes o erróneos
             rm -rf drivers/kernelsu
             rm -rf ../KernelSU

             # 2. Clonar KernelSU en la raíz del espacio de trabajo (fuera de drivers)
             cd ..
             git clone --depth=1 https://github.com/tiann/KernelSU KernelSU
             cd kernel-source

             # 3. Crear el enlace simbólico CORRECTO apuntando directamente a la subcarpeta 'kernel'
             cd drivers
             ln -sf ../../KernelSU/kernel kernelsu
             cd ..

             # 4. Registrar de manera limpia la ruta en el sistema de compilación
             echo "" >> drivers/Makefile
             grep -q "kernelsu/" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile
    
             echo "" >> drivers/Kconfig
             grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

             # 5. Aplicar el parche de SUSFS diseñado para KernelSU en su directorio real
             cd ../KernelSU/kernel
             patch -p1 --fuzz=3 --ignore-whitespace < ../../kernel-source/../susfs-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "Aviso: Reajuste menor en parche integrado de KernelSU"
    
             cd ../../kernel-source

             # 6. Aplicar el parche general de SUSFS para el Kernel GKI 6.6
             patch -p1 --fuzz=3 --ignore-whitespace < ../susfs-src/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || echo "Aviso: Reajuste menor en parche principal"

             # 7. Copiar todos los archivos de cabecera y código de SUSFS al árbol del kernel
             cp ../susfs-src/include/linux/susfs.h include/linux/
             cp ../susfs-src/include/linux/susfs_def.h include/linux/
             cp ../susfs-src/fs/susfs.c fs/

             # 8. Asegurar que susfs.o se enlace en el sistema de archivos
             echo "" >> fs/Makefile
             grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile

      - name: Forzar Configuración (4KB, KernelSU y SUSFS)
        run: |
          cd kernel-source
          
          # Asegurar el tamaño de página de 4KB
          echo "CONFIG_ARM64_4K_PAGES=y" >> arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_16K_PAGES/d' arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_64K_PAGES/d' arch/arm64/configs/gki_defconfig
          
          # Habilitar las banderas de compilación necesarias
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SUSFS=y" >> arch/arm64/configs/gki_defconfig

      - name: Compilar Núcleo GKI (Estandar LLVM)
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Generamos la configuración base usando el entorno LLVM
          make O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # Compilamos el kernel completo
          make -j$(nproc) O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Subir Binario Resultante (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: kernel_4k_ksunext_susfs
          path: kernel-source/out/arch/arm64/boot/Image.gz
          
