name: Compilador de Kernel GKI 6.6 con KSU y SUSFS

on:
  workflow_dispatch: # Permite lanzar la compilación manualmente desde la pestaña Actions

# =========================================================================
# ⚠️ CONFIGURACIÓN: KERNEL GENÉRICO DE GOOGLE (GKI 6.6)
# =========================================================================
env:
  KERNEL_REPO: 'https://android.googlesource.com/kernel/common'
  KERNEL_BRANCH: 'android6.6-6.6'
# =========================================================================

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el Repositorio Base (CI Config)
        uses: actions/checkout@v4

      - name: Instalar Dependencias y Compiladores Nativos
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld liblz4-tool pixz zip

      - name: Clonar Código Fuente del Kernel Real
        run: |
          echo "Clonando código fuente del kernel desde $KERNEL_REPO (Rama: $KERNEL_BRANCH)..."
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} $GITHUB_WORKSPACE/kernel-source

      - name: Clonar repositorio SUSFS (GitLab Simonpunk - GKI 6.6)
        run: |
          git clone --depth=1 -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git $GITHUB_WORKSPACE/susfs-src

      - name: Inyectar KernelSU y Parches SUSFS
        run: |
          # 1. Limpieza absoluta usando rutas fijas globales
          rm -rf $GITHUB_WORKSPACE/kernel-source/drivers/kernelsu
          rm -rf $GITHUB_WORKSPACE/KernelSU

          # 2. Clonar KernelSU estándar en la raíz del espacio de trabajo
          git clone --depth=1 https://github.com/tiann/KernelSU $GITHUB_WORKSPACE/KernelSU

          # 3. Crear el enlace simbólico usando rutas absolutas seguras
          cd $GITHUB_WORKSPACE/kernel-source/drivers
          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel kernelsu

          # 4. Registrar la ruta en el sistema de compilación del Kernel
          cd $GITHUB_WORKSPACE/kernel-source
          echo "" >> drivers/Makefile
          grep -q "kernelsu/" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile
          
          echo "" >> drivers/Kconfig
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          # 5. Localizar y aplicar el parche de SUSFS para KernelSU dinámicamente
          cd $GITHUB_WORKSPACE/KernelSU/kernel
          KSU_PATCH=$(find $GITHUB_WORKSPACE/susfs-src -name "*enable_susfs_for_ksu*.patch" | head -n 1)
          if [ ! -z "$KSU_PATCH" ]; then
              echo "Aplicando parche de KernelSU encontrado en: $KSU_PATCH"
              patch -p1 --fuzz=3 --ignore-whitespace < "$KSU_PATCH" || echo "Aviso: Ajuste menor en parche de KernelSU"
          else
              echo "Aviso: No se encontró parche específico para KernelSU, saltando..."
          fi
          
          # 6. Regresar a kernel-source y aplicar el parche general de SUSFS para GKI 6.6
          cd $GITHUB_WORKSPACE/kernel-source
          GKI_PATCH=$(find $GITHUB_WORKSPACE/susfs-src -name "*add_susfs_in_gki*.patch" | head -n 1)
          if [ ! -z "$GKI_PATCH" ]; then
              echo "Aplicando parche GKI principal encontrado en: $GKI_PATCH"
              patch -p1 --fuzz=3 --ignore-whitespace < "$GKI_PATCH" || echo "Aviso: Ajuste menor en parche principal"
          else
              echo "Aviso: No se encontró parche GKI principal, saltando..."
          fi

          # 7. Copiar archivos de cabecera y código fuente de SUSFS con detección inteligente
          echo "== Verificando si los archivos de SUSFS ya existen o necesitan copia =="
          REAL_SUSFS_H=$(find $GITHUB_WORKSPACE/susfs-src -name "susfs.h" | head -n 1)
          REAL_SUSFS_DEF_H=$(find $GITHUB_WORKSPACE/susfs-src -name "susfs_def.h" | head -n 1)
          REAL_SUSFS_C=$(find $GITHUB_WORKSPACE/susfs-src -name "susfs.c" | head -n 1)

          if [ ! -f include/linux/susfs.h ] && [ ! -z "$REAL_SUSFS_H" ]; then
              echo "Inyectando susfs.h desde: $REAL_SUSFS_H"
              cp "$REAL_SUSFS_H" include/linux/
          fi

          if [ ! -f include/linux/susfs_def.h ] && [ ! -z "$REAL_SUSFS_DEF_H" ]; then
              echo "Inyectando susfs_def.h desde: $REAL_SUSFS_DEF_H"
              cp "$REAL_SUSFS_DEF_H" include/linux/
          fi

          if [ ! -f fs/susfs.c ] && [ ! -z "$REAL_SUSFS_C" ]; then
              echo "Inyectando susfs.c desde: $REAL_SUSFS_C"
              cp "$REAL_SUSFS_C" fs/
          fi

          # 8. Asegurar que susfs.o se enlace en el sistema de archivos del kernel
          echo "" >> fs/Makefile
          grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile

      - name: Configurar Defconfig y Compilar Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel-source

          # 1. Forzar tamaño de página a 4KB para máxima compatibilidad y evitar bootloops
          echo "CONFIG_ARM64_4K_PAGES=y" >> arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_16K_PAGES/d' arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_64K_PAGES/d' arch/arm64/configs/gki_defconfig

          # 2. Habilitar banderas estables de KernelSU y SUSFS
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/gki_defconfig

          # 3. Lanzar la compilación oficial
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- gki_defconfig
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- -j$(nproc)

      - name: Empaquetar Kernel con AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source/out -name "Image" | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
              KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source -name "Image" | head -n 1)
          fi

          if [ ! -z "$KERNEL_IMAGE" ]; then
              echo "¡Kernel Image detectado exitosamente en: $KERNEL_IMAGE!"
              cp "$KERNEL_IMAGE" AnyKernel3/
              
              cd AnyKernel3
              sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
              sed -i 's/block=\/dev\/block\/bootdevice\/by-name\/boot/block=auto/g' anykernel.sh
              
              zip -r9 $GITHUB_WORKSPACE/Kernel_GKI_6.6_SUSFS_4KB.zip *
          else
              echo "ERROR CRÍTICO: No se generó el archivo binario 'Image'."
              exit 1
          fi

      - name: Subir ZIP del Kernel Terminado
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_GKI_6.6_SUSFS_ZIP_Instalable
          path: ${{ github.workspace }}/Kernel_GKI_6.6_SUSFS_4KB.zip
