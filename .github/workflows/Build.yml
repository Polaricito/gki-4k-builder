name: Compilador de Kernel Samsung (KernelSU + SUSFS Oficial)

on:
  workflow_dispatch:
    inputs:
      DEFCONFIG_NAME:
        description: 'Nombre del archivo defconfig de tu Samsung'
        required: true
        default: 'defconfig'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Repositorio (CI Config y Fuentes)
        uses: actions/checkout@v4

      - name: Verificar y Corregir Estructura de Fuentes (Auto-Aplanar kernel-6.6)
        run: |
          # 1. Si los archivos están atrapados dentro de 'kernel-6.6', los movemos a la raíz de 'kernel-source'
          if [ -d "$GITHUB_WORKSPACE/kernel-source/kernel-6.6" ]; then
              echo "¡Estructura anidada detectada (kernel-6.6)! Aplanando carpetas automáticamente..."
              mv $GITHUB_WORKSPACE/kernel-source/kernel-6.6/* $GITHUB_WORKSPACE/kernel-source/ 2>/dev/null || true
              mv $GITHUB_WORKSPACE/kernel-source/kernel-6.6/.* $GITHUB_WORKSPACE/kernel-source/ 2>/dev/null || true
              rmdir $GITHUB_WORKSPACE/kernel-source/kernel-6.6 || true
          fi

          # 2. Verificación final de que las carpetas principales están en su lugar
          if [ -d "$GITHUB_WORKSPACE/kernel-source/drivers" ] && [ -d "$GITHUB_WORKSPACE/kernel-source/arch" ]; then
              echo "¡Estructura de carpetas corregida con éxito! Listo para trabajar."
          else
              echo "ERROR CRÍTICO: No se encuentra la estructura base del kernel (arch/ o drivers/) en la raíz de kernel-source."
              echo "Contenido actual de kernel-source:"
              ls -la $GITHUB_WORKSPACE/kernel-source
              exit 1
          fi

      - name: Instalar Dependencias y Compiladores Nativos
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld liblz4-tool pixz zip binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu python3

      - name: Integrar KernelSU NATIVO
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Descargar e Integrar SUSFS Oficial (Rama android15-6.6)
        run: |
          cd $GITHUB_WORKSPACE
          # Clonamos la rama específica del repositorio oficial de simonpunk de forma no interactiva
          git config --global url."https://github.com/".insteadOf git@github.com:
          git clone --depth=1 -b android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git susfs_assets
          
          cd $GITHUB_WORKSPACE/kernel-source
          
          # Copiar archivos esenciales de drivers SUSFS al árbol de tu kernel
          if [ -f "$GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/FS_PATCH/fs/susfs.c" ]; then
              cp $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/FS_PATCH/fs/susfs.c fs/
              echo "¡susfs.c copiado!"
          fi
          
          if [ -f "$GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/Include_Patches/include/linux/susfs.h" ]; then
              cp $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/Include_Patches/include/linux/susfs.h include/linux/
              echo "¡susfs.h copiado!"
          fi
          
          # Buscar de forma inteligente el archivo .patch de la rama de simonpunk para aplicarlo
          PATCH_FILE=$(find $GITHUB_WORKSPACE/susfs_assets/Kernel_Patches/ -name "*susfs*.patch" | head -n 1)
          
          if [ -f "$PATCH_FILE" ]; then
              echo "Aplicando parche SUSFS oficial: $PATCH_FILE"
              git apply --check "$PATCH_FILE" || echo "Aviso: git apply --check detectó diferencias menores, procediendo..."
              git apply "$PATCH_FILE" || echo "Aviso: El parche automático continuó con modificaciones parciales..."
          else
              echo "Aviso: No se localizó un archivo .patch automático, continuando con archivos copiados..."
          fi

      - name: Configurar Defconfig y Dieta Estricta de Tamaño
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          TARGET_CONFIG="arch/arm64/configs/${{ github.event.inputs.DEFCONFIG_NAME }}"
          
          if [ ! -f "$TARGET_CONFIG" ]; then
              echo "ERROR: El archivo de configuración $TARGET_CONFIG no existe en tus fuentes."
              exit 1
          fi

          # 1. Asegurar tamaño de página de memoria a 4KB
          echo "CONFIG_ARM64_4K_PAGES=y" >> $TARGET_CONFIG
          sed -i '/CONFIG_ARM64_16K_PAGES/d' $TARGET_CONFIG
          sed -i '/CONFIG_ARM64_64K_PAGES/d' $TARGET_CONFIG

          # 2. Habilitar banderas oficiales de KernelSU y SUSFS
          echo "CONFIG_KSU=y" >> $TARGET_CONFIG
          echo "CONFIG_SUSFS=y" >> $TARGET_CONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $TARGET_CONFIG
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $TARGET_CONFIG

          # 3. Eliminar símbolos de depuración para evitar sobrepeso
          sed -i '/CONFIG_DEBUG_INFO/d' $TARGET_CONFIG
          echo "CONFIG_DEBUG_INFO_NONE=y" >> $TARGET_CONFIG

          # 4. Forzar optimización de tamaño binario (-Os)
          sed -i '/CONFIG_CC_OPTIMIZE/d' $TARGET_CONFIG
          echo "CONFIG_CC_OPTIMIZE_FOR_SIZE=y" >> $TARGET_CONFIG

      - name: Compilar Kernel Oficial Samsung
        run: |
          cd $GITHUB_WORKSPACE/kernel-source
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- ${{ github.event.inputs.DEFCONFIG_NAME }}
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Empaquetar Kernel (AnyKernel3 Seguro para Samsung)
        run: |
          cd $GITHUB_WORKSPACE
          
          KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source/out -name "Image" | head -n 1)
          if [ -z "$KERNEL_IMAGE" ]; then
              KERNEL_IMAGE=$(find $GITHUB_WORKSPACE/kernel-source -name "Image" | head -n 1)
          fi

          if [ -z "$KERNEL_IMAGE" ]; then
              echo "ERROR CRÍTICO: No se generó el archivo 'Image' durante la compilación."
              exit 1
          fi
          echo "¡Kernel Image detectado exitosamente en: $KERNEL_IMAGE!"

          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp "$KERNEL_IMAGE" AnyKernel3/Image
          cd AnyKernel3
          
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's|block=/dev/block/bootdevice/by-name/boot;|block=/dev/block/by-name/boot;|g' anykernel.sh
          sed -i 's|block=auto;|block=/dev/block/by-name/boot;|g' anykernel.sh
          
          zip -r9 $GITHUB_WORKSPACE/Kernel_Samsung_OneUI7_KernelSU_SUSFS.zip *
          echo "¡ZIP de AnyKernel3 creado exitosamente!"

      - name: Subir Artefacto Compilado a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Samsung_Modificado
          path: ${{ github.workspace }}/Kernel_Samsung_OneUI7_KernelSU_SUSFS.zip
          
