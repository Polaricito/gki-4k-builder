name: Compilador de Kernel GKI con KernelSU y SUSFS

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  KERNEL_ROOT: "kernel-source/kernel-6.6" # Ajusta esta ruta si tu carpeta de origen tiene otro nombre
  TARGET_CONFIG: "gki_defconfig"          # Ajusta al nombre de tu defconfig si es diferente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Repositorio Local
        uses: actions/checkout@v4

      - name: Configurar Entorno de Compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libelf-dev libssl-dev lld llvm crossbuild-essential-arm64

      - name: Descargar e Integrar SUSFS Oficial
        run: |
          cd $GITHUB_WORKSPACE
          REPO_URL="https://gitlab.com/simonpunk/susfs4ksu.git"
          WANT_BRANCH="android15-6.6"
          TARGET_DIR="$GITHUB_WORKSPACE/susfs_assets"
          
          echo "Verificando disponibilidad de la rama $WANT_BRANCH en el servidor de SUSFS..."
          if git ls-remote --heads "$REPO_URL" "$WANT_BRANCH" | grep -q "$WANT_BRANCH"; then
              echo "Rama específica encontrada. Clonando..."
              git clone --depth=1 -b "$WANT_BRANCH" "$REPO_URL" "$TARGET_DIR"
          else
              echo "Aviso: La rama $WANT_BRANCH no está disponible en este momento. Clonando rama principal por defecto..."
              git clone --depth=1 "$REPO_URL" "$TARGET_DIR"
          fi

      - name: Parchear mm/io_record.c y Ganchos de Rastreo de Samsung
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          if [ -f "mm/io_record.c" ]; then
              echo "Inyectando stubs de mitigación completos en mm/io_record.c..."
              
              # Prevenir errores de -Werror,-Wunused-function marcando funciones inactivas como permitidas
              sed -i 's/^static void io_record_ksys_umount/static void __maybe_unused io_record_ksys_umount/' mm/io_record.c
              sed -i 's/^static void io_record_do_read_fault/static void __maybe_unused io_record_do_read_fault/' mm/io_record.c
              sed -i 's/^static void io_record_filemap_map_pages/static void __maybe_unused io_record_filemap_map_pages/' mm/io_record.c
              sed -i 's/^static void io_record_filemap_read/static void __maybe_unused io_record_filemap_read/' mm/io_record.c
              
              # Inyectar macros de desactivación al final del archivo
              {
                echo "#define register_trace_android_vh_do_read_fault(...) 0"
                echo "#define unregister_trace_android_vh_do_read_fault(...) 0"
                echo "#define register_trace_android_vh_filemap_map_pages(...) 0"
                echo "#define unregister_trace_android_vh_filemap_map_pages(...) 0"
                echo "#define register_trace_android_vh_filemap_read(...) 0"
                echo "#define unregister_trace_android_vh_filemap_read(...) 0"
                echo "#define register_trace_android_rvh_ksys_umount(...) 0"
                echo "#define unregister_trace_android_rvh_ksys_umount(...) 0"
              } > mm/io_record.tmp
              cat mm/io_record.tmp >> mm/io_record.c
              rm mm/io_record.tmp
              echo "¡Modificaciones de mitigación en mm/io_record.c completadas!"
          fi

      - name: Crear Stubs de Hooks de Rastreo Android (Ganchos Samsung)
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          HOOK_DIR="include/trace/hooks"
          mkdir -p "$HOOK_DIR"
          
          # Generación limpia sin sangrado que rompa la terminal (Evita errores de Here-Doc EOF)
          if [ ! -f "$HOOK_DIR/mm.h" ]; then
              echo "Generando stub de emergencia: $HOOK_DIR/mm.h"
              cat << 'EOF' > "$HOOK_DIR/mm.h"
#ifndef _TRACE_HOOK_MM_H
#define _TRACE_HOOK_MM_H
#include <linux/tracepoint.h>

DECLARE_TRACE(android_vh_do_read_fault, TP_PROTO(void *data, struct vm_fault *vmf, unsigned long fault_around_pages), TP_ARGS(data, vmf, fault_around_pages));
DECLARE_TRACE(android_vh_filemap_map_pages, TP_PROTO(void *data, struct file *file, pgoff_t first_pgoff, pgoff_t last_pgoff, vm_fault_t ret), TP_ARGS(data, file, first_pgoff, last_pgoff, ret));
DECLARE_TRACE(android_vh_filemap_read, TP_PROTO(void *data, struct file *file, loff_t pos, size_t size), TP_ARGS(data, file, pos, size));

#endif
EOF
          fi
          
          if [ ! -f "$HOOK_DIR/fs.h" ]; then
              echo "Generando stub de emergencia: $HOOK_DIR/fs.h"
              cat << 'EOF' > "$HOOK_DIR/fs.h"
#ifndef _TRACE_HOOK_FS_H
#define _TRACE_HOOK_FS_H
#include <linux/tracepoint.h>

DECLARE_TRACE(android_rvh_ksys_umount, TP_PROTO(void *data, char __user *name, int flags), TP_ARGS(data, name, flags));

#endif
EOF
          fi

      - name: Sanear y Unificar Definiciones de fslog_stlog
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          if [ -f "fs/fuse/inode.c" ]; then
              echo "Detectado fs/fuse/inode.c. Eliminando código viejo y duplicados de fslog_stlog..."
              
              # Neutralizar la firma void rota original de Samsung cambiándole el nombre
              sed -i 's/void __attribute__((weak)) fslog_stlog/void __attribute__((weak)) fslog_stlog_old/g' fs/fuse/inode.c
              sed -i 's/void __attribute__((weak))fslog_stlog/void __attribute__((weak)) fslog_stlog_old/g' fs/fuse/inode.c
              
              # Eliminar cualquier duplicado 'int' inyectado acumulativamente de ejecuciones previas
              sed -i '/int __attribute__((weak)) fslog_stlog/,/}/d' fs/fuse/inode.c
              
              # Escribir una sola firma limpia tipo 'int' que concuerde perfectamente con fslog.h
              cat << 'EOF' >> fs/fuse/inode.c

int __attribute__((weak)) fslog_stlog(const char *fmt, ...) {
    return 0;
}
EOF
              echo "¡Purga y unificación de fslog_stlog finalizada con éxito!"
          fi

      - name: Auto-Detector de Defconfig y Ajustes de Compilación
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          # Asegurar que FUSE se compile integrado para evitar conflictos de símbolos dinámicos (.ko)
          if [ -f "arch/arm64/configs/${{ env.TARGET_CONFIG }}" ]; then
              sed -i 's/CONFIG_FUSE_FS=m/CONFIG_FUSE_FS=y/g' arch/arm64/configs/${{ env.TARGET_CONFIG }}
              echo "CONFIG_FUSE_FS=y" >> arch/arm64/configs/${{ env.TARGET_CONFIG }}
              echo "CONFIG_SAMSUNG_DEBUG_FS_LOGGING=n" >> arch/arm64/configs/${{ env.TARGET_CONFIG }}
          fi

      - name: Compilar Kernel Completo
        run: |
          cd $GITHUB_WORKSPACE/${{ env.KERNEL_ROOT }}
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out ${{ env.TARGET_CONFIG }}
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out -j$(nproc)

      - name: Desempaquetar y Re-empaquetar con el boot.img del Usuario
        run: |
          echo "Buscando boot.img de 32MB subido previamente a la raíz del repositorio..."
          if [ -f "$GITHUB_WORKSPACE/boot.img" ]; then
              echo "¡boot.img original localizado!"
              # Aquí van tus herramientas de empaquetado (como AIK o scripts magiskboot/mkbootimg)
              # Ejemplo básico conceptual (ajusta según tus herramientas de repack):
              # ./magiskboot unpack $GITHUB_WORKSPACE/boot.img
              # cp out/arch/arm64/boot/Image kernel
              # ./magiskboot repack $GITHUB_WORKSPACE/boot.img $GITHUB_WORKSPACE/boot-kernelsu.img
          else
              echo "ERROR: El archivo boot.img no se encuentra en la raíz del repositorio. Asegúrate de que subió correctamente."
              exit 1
          fi

      - name: Subir Imagen de Boot Modificada (Artefacto)
        uses: actions/artifacts@v4
        with:
          name: boot-patched-KernelSU
          path: |
            boot-kernelsu.img
            kernel-source/kernel-6.6/out/arch/arm64/boot/Image
