name: Compilar GKI 6.6 con KSU-Next y SUSFS (4KB)
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximizar espacio de almacenamiento en el servidor
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Clonar Android Common Kernel (GKI 6.6)
        run: |
          git clone --depth=1 -b android15-6.6 https://android.googlesource.com/kernel/common kernel-source

      - name: Instalar Dependencias y Compiladores LLVM Nativos
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison git libncurses-dev clang lld llvm gcc-aarch64-linux-gnu

      - name: Inyectar KernelSU-Next y Parches SUSFS
        run: |
          cd kernel-source

          # 1. Clonar KernelSU-Next de forma limpia
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next drivers/kernelsu

          # Enlace inteligente de Kconfig y Makefile si vienen dentro de la subcarpeta 'kernel/'
          if [ -d drivers/kernelsu/kernel ]; then
            echo "Estructura con subcarpeta 'kernel/' detectada. Enlazando Kconfig y Makefile..."
            ln -sf kernel/Kconfig drivers/kernelsu/Kconfig
            ln -sf kernel/Makefile drivers/kernelsu/Makefile
          fi

          # Seguro contra fallos: Si sigue sin existir Kconfig, generamos uno limpio
          if [ ! -f drivers/kernelsu/Kconfig ]; then
            echo "Aviso: Kconfig no encontrado. Generando Kconfig de emergencia..."
            cat > drivers/kernelsu/Kconfig << 'EOF'
          config KSU
          	bool "KernelSU"
          	default y

          config KSU_SUSFS
          	bool "KernelSU SUSFS Support"
          	depends on KSU
          	default y
          EOF
          fi

          # Seguro contra fallos: Si sigue sin existir Makefile, generamos uno de enlace directo
          if [ ! -f drivers/kernelsu/Makefile ]; then
            echo "Aviso: Makefile no encontrado. Generando Makefile de emergencia..."
            echo "obj-y += core/" > drivers/kernelsu/Makefile
          fi

          # Crear enlaces de compatibilidad para parches rígidos de SUSFS
          ln -sf kernelsu drivers/KernelSU
          ln -sf kernelsu drivers/KernelSU-Next

          # 2. Integrar KernelSU-Next en el sistema de construcción principal
          grep -q "kernelsu/" drivers/Makefile || echo "obj-y += kernelsu/" >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '$i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          # 3. Clonar parches oficiales de SUSFS para GKI 6.6
          git clone -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs-src

          # 4. Copiar headers de SUSFS y archivo fuente al árbol del kernel
          cp -v ../susfs-src/kernel_patches/include/linux/*.h include/linux/
          cp -v ../susfs-src/kernel_patches/fs/susfs.c fs/

          # 5. Aplicar el parche principal de SUSFS con detector de rechazos
          echo "=== Aplicando parche principal SUSFS ==="
          if ! patch -p1 --fuzz=3 --ignore-whitespace < ../susfs-src/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch; then
            echo "❌ ERROR: El parche principal de SUSFS falló. Mostrando líneas rechazadas:"
            find . -name "*.rej" -exec echo "--- Archivo: {} ---" \; -exec cat {} \;
            exit 1
          fi

          # Asegurar la inclusión de susfs.o en la compilación
          if [ -f kernel/Kbuild ]; then
            grep -q "susfs.o" kernel/Kbuild || echo "obj-y += ../fs/susfs.o" >> kernel/Kbuild
          fi

          # 6. Aplicar el parche de SUSFS específico para KernelSU-Next usando el motor de Git
          echo "=== Aplicando parche SUSFS a KernelSU con Git Apply ==="
          cd drivers/kernelsu

          # Configurar identidad temporal de Git (necesaria para operaciones de fusión de 3 vías)
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Intentar la aplicación inteligente del parche
          if ! git apply --3way --whitespace=fix ../../../susfs-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch; then
            echo "⚠️ 'git apply --3way' directo falló. Intentando con método de parches tolerantes..."
            
            # Fallback: Si Git no puede fusionarlo limpiamente, intentamos el parche tradicional con fuzz máximo
            if ! patch -p1 --fuzz=3 --ignore-whitespace < ../../../susfs-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch; then
              echo "❌ ERROR CRÍTICO: El código de KernelSU-Next ha cambiado demasiado respecto al parche de SUSFS."
              echo "Mostrando los fragmentos rechazados (.rej) para ver los cambios exactos:"
              find . -name "*.rej" -exec echo "--- Archivo: {} ---" \; -exec cat {} \;
              exit 1
            fi
          fi

      - name: Forzar Configuración (4KB, KernelSU y SUSFS)
        run: |
          cd kernel-source
          
          # Asegurar el tamaño de página de 4KB
          echo "CONFIG_ARM64_4K_PAGES=y" >> arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_16K_PAGES/d' arch/arm64/configs/gki_defconfig
          sed -i '/CONFIG_ARM64_64K_PAGES/d' arch/arm64/configs/gki_defconfig
          
          # Habilitar las banderas de compilación necesarias
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_SUSFS=y" >> arch/arm64/configs/gki_defconfig

      - name: Compilar Núcleo GKI (Estandar LLVM)
        run: |
          cd kernel-source
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Generamos la configuración base usando el entorno LLVM
          make O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # Compilamos el kernel completo
          make -j$(nproc) O=out LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Subir Binario Resultante (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: kernel_4k_ksunext_susfs
          path: kernel-source/out/arch/arm64/boot/Image.gz
          
